<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Mock Test - All Skills</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- SKILL SELECTION PAGE -->
    <div id="skillSelection" class="skill-selection-container">
        <div class="skill-selection-content">
            <h1>IELTS Mock Test</h1>
            <p>Select a skill to begin your test</p>
            <div class="skill-buttons">
                <button onclick="startSkill('listening')" class="skill-btn listening-btn">
                    <span class="skill-icon">🎧</span>
                    <span class="skill-name">Listening</span>
                    <span class="skill-time">~30 minutes</span>
                </button>
                <button onclick="startSkill('reading')" class="skill-btn reading-btn">
                    <span class="skill-icon">📖</span>
                    <span class="skill-name">Reading</span>
                    <span class="skill-time">~60 minutes</span>
                </button>
                <button onclick="startSkill('writing')" class="skill-btn writing-btn">
                    <span class="skill-icon">✍️</span>
                    <span class="skill-name">Writing</span>
                    <span class="skill-time">~60 minutes</span>
                </button>
            </div>
        </div>
    </div>

    <!-- TEST INTERFACE -->
    <div id="testInterface" class="test-interface" style="display: none;">
        <header class="test-header">
            <div class="header-left">
                <h2 id="skillTitle">IELTS Mock Test</h2>
                <p id="sectionInfo"></p>
            </div>
            <div class="header-right">
                <div class="timer-container">
                    <span class="timer-label">Time Remaining:</span>
                    <span id="timer" class="timer">60:00</span>
                </div>
                <button onclick="submitTest()" class="submit-btn">Submit Test</button>
            </div>
        </header>

        <div class="test-container">
            <!-- LEFT PANEL - CONTENT -->
            <div class="content-panel">
                <!-- Listening Content -->
                <div id="listeningContent" class="content-section" style="display: none;">
                    <div id="listeningSection"></div>
                </div>

                <!-- Reading Content -->
                <div id="readingContent" class="content-section" style="display: none;">
                    <div id="passageContent"></div>
                </div>

                <!-- Writing Content -->
                <div id="writingContent" class="content-section" style="display: none;">
                    <div id="writingSection"></div>
                </div>
            </div>

            <!-- RIGHT PANEL - QUESTIONS/ANSWERS -->
            <div class="question-panel">
                <!-- Listening Questions -->
                <div id="listeningQuestions" class="questions-section" style="display: none;">
                    <h3>Questions</h3>
                    <div id="listeningQuestionsContainer"></div>
                </div>

                <!-- Reading Questions -->
                <div id="readingQuestions" class="questions-section" style="display: none;">
                    <h3>Questions</h3>
                    <div id="readingQuestionsContainer"></div>
                </div>

                <!-- Writing Editor -->
                <div id="writingEditor" class="writing-editor" style="display: none;">
                    <h3 id="writingTaskTitle"></h3>
                    <div class="word-count">
                        <span>Word Count: <strong id="wordCount">0</strong> / <span id="wordTarget">150</span></span>
                    </div>
                    <textarea id="writingTextarea" placeholder="Write your answer here..." maxlength="5000"></textarea>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="navigation-bar">
            <button onclick="previousQuestion()" class="nav-btn">← Previous</button>
            <div id="questionNumbers" class="question-numbers"></div>
            <button onclick="nextQuestion()" class="nav-btn">Next →</button>
        </div>
    </div>

    <!-- RESULTS PAGE -->
    <div id="resultsPage" class="results-container" style="display: none;">
        <div class="results-content">
            <h1>Test Submitted Successfully</h1>
            <p>Your answers have been sent to your instructor's email.</p>
            <div class="results-info">
                <p><strong>Skill Tested:</strong> <span id="resultSkill"></span></p>
                <p><strong>Questions Answered:</strong> <span id="resultAnswered"></span></p>
                <p><strong>Submission Time:</strong> <span id="resultTime"></span></p>
            </div>
            <button onclick="location.reload()" class="restart-btn">Take Another Test</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
